server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — lets the `backend` hostname re-resolve at request
    # time, so the proxy survives the backend container being recreated.
    resolver 127.0.0.11 valid=10s;

    # ── API → Flask backend ───────────────────────────────────────────────────
    # Same-origin: the SPA calls /api/v1/... and nginx forwards to the backend,
    # so no CORS is needed and VITE_API_BASE_URL can be https://<domain>/api/v1
    location /api/ {
        set $backend http://backend:5000;
        proxy_pass $backend$request_uri;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 11m;   # allow 10 MB uploads (MAX_CONTENT_LENGTH)
        proxy_read_timeout 120s;    # YOLO inference can take a few seconds
    }

    # ── Uploaded hazard images (served by Flask send_from_directory) ──────────
    # ^~ prevents the .jpg/.png regex below from intercepting image requests.
    location ^~ /uploads/ {
        set $backend http://backend:5000;
        proxy_pass $backend$request_uri;
        proxy_set_header Host $host;
    }

    # ── SPA ───────────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
